buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    tasks.withType(org.gradle.api.tasks.AbstractExecTask) {
        if (it.name.contains("generateCodegenSchemaFromJavaScript") || it.name.contains("generateCodegenArtifactsFromSchema")) {
            environment "NODE_BINARY", "/Users/ved/.nvm/versions/node/v23.7.0/bin/node"
        }
    }
}
